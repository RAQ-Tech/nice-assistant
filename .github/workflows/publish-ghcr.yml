name: Publish container image

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install browser dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Install verification dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run repository verification
        run: python scripts/verify.py

  build-and-push:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive deterministic image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/nice-assistant"
          version="$GITHUB_REF_NAME"
          tags="${image}:sha-${GITHUB_SHA:0:7}"
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            version="main"
            tags+=$'\n'"${image}:main"
            tags+=$'\n'"${image}:latest"
          else
            tags+=$'\n'"${image}:${GITHUB_REF_NAME}"
          fi
          {
            echo 'tags<<EOF'
            echo "$tags"
            echo 'EOF'
            echo 'labels<<EOF'
            echo "org.opencontainers.image.created=$(date --utc +'%Y-%m-%dT%H:%M:%SZ')"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.version=${version}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
